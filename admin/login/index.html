<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResumeBuzz Admin Login</title>
<meta name="robots" content="noindex">
<style>
@font-face{font-family:'DM Sans';font-style:normal;font-weight:100 900;font-display:optional;src:url('/assets/fonts/dm-sans.woff2') format('woff2')}
@font-face{font-family:'Playfair Display';font-style:normal;font-weight:400 900;font-display:optional;src:url('/assets/fonts/playfair.woff2') format('woff2')}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#111111;--surface:#1B1B1B;--border:#2E2E2E;--gold:#C9A84C;--text:#EBEBEB;--muted:#8C8C8C;--red:#E05A3A}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.logo{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:900;color:var(--gold);margin-bottom:2.5rem;letter-spacing:0.02em}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2rem 2.25rem;width:100%;max-width:360px}
h1{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--text);margin-bottom:0.35rem}
.sub{font-size:0.83rem;color:var(--muted);margin-bottom:1.75rem}
label{display:block;font-size:0.78rem;color:var(--muted);margin-bottom:0.4rem;letter-spacing:0.04em;text-transform:uppercase}
input[type="password"]{width:100%;background:#0D0D0D;border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.95rem;padding:0.65rem 0.85rem;outline:none;transition:border-color 0.15s;margin-bottom:1.25rem}
input[type="password"]:focus{border-color:var(--gold)}
button{width:100%;background:var(--gold);color:#111;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:700;border:none;border-radius:7px;padding:0.75rem;cursor:pointer;transition:opacity 0.15s}
button:hover{opacity:0.88}
.error{font-size:0.82rem;color:var(--red);margin-top:0.75rem;text-align:center;display:none}
</style>
</head>
<body>
<div class="logo">ResumeBuzz</div>
<div class="card">
  <h1>Admin Access</h1>
  <p class="sub">Enter password to unlock the builder.</p>
  <form id="loginForm">
    <label for="pw">Password</label>
    <input type="password" id="pw" autocomplete="current-password" autofocus>
    <button type="submit">Unlock</button>
    <div class="error" id="errMsg">Incorrect password.</div>
  </form>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var pw = document.getElementById('pw').value;
  if (pw === 'S33dOYE1215!!') {
    document.cookie = 'oye_admin=1; path=/; max-age=2592000; SameSite=Lax';
    var dest = new URLSearchParams(location.search).get('next') || '/build';
    window.location.href = dest;
  } else {
    document.getElementById('errMsg').style.display = 'block';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
});
</script>
</body>
</html>
